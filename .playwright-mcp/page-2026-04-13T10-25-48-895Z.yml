    - generic [ref=e149]:
      - heading "Jak na to?" [level=2] [ref=e150]
      - heading "1." [level=4] [ref=e151]:
        - strong [ref=e152]: "1."
      - paragraph [ref=e153]: Banány rozmixuj na hladký krém.
      - heading "2." [level=4] [ref=e154]:
        - strong [ref=e155]: "2."
      - paragraph [ref=e156]: Odděl žloutky od bílků. K bílkům přidej citronovou šťávu, špetku soli a vyšlehej tuhý sníh.
      - heading "3." [level=4] [ref=e157]:
        - strong [ref=e158]: "3."
      - paragraph [ref=e159]: K banánům přidej žloutky, olej, mléko a pořádně promíchej.
      - heading "4." [level=4] [ref=e160]:
        - strong [ref=e161]: "4."
      - paragraph [ref=e162]: Ve větší míse metličkou smíchej mouku, škrob a prášek do pečiva.
      - heading "5." [level=4] [ref=e163]:
        - strong [ref=e164]: "5."
      - paragraph [ref=e165]: Do mísy k sypkým surovinám přilej banánovou směs. Metličkou míchej jen tak dlouho, dokud se suché a mokré ingredience nepropojí.
      - heading "6." [level=4] [ref=e166]:
        - strong [ref=e167]: "6."
      - paragraph [ref=e168]: Do těsta opatrně vmíchej sníh.
      - heading "7." [level=4] [ref=e169]:
        - strong [ref=e170]: "7."
      - paragraph [ref=e171]: Dno dortové formy vylož pečícím papírem, nalij do ní těsto a peč na 170 °C asi 40 minut (kotroluj špejlí).
      - heading "8." [level=4] [ref=e172]:
        - strong [ref=e173]: "8."
      - paragraph [ref=e174]: Hotový korpus nech asi 10 minut chladnout ve formě, pak ho po obvodu odděl pomocí špejle a bok dortové formy sundej. Před prokrajováním musí být korpus úplně vychladlý.
      - heading "9." [level=4] [ref=e175]:
        - strong [ref=e176]: "9."
      - paragraph [ref=e177]:
        - link "Lyofilizované ovoce" [ref=e178] [cursor=pointer]:
          - /url: https://www.ochutnejorech.cz/kategorie/lyofilizovane-ovoce/?a_box=qzuy9j66
        - text: rozmixuj ve stolním mixéru na prach. Z řeckého jogurtu odeber asi 3 lžíce, přisyp k nim prach z ovoce (pozor, lítá všude kolem) a pečlivě rozmíchej. Tuhle část krému pak přidej ke zbytku jogurtu.
      - heading "10." [level=4] [ref=e179]:
        - strong [ref=e180]: "10."
      - paragraph [ref=e181]: Než korpus vychladne a ty se pustíš do zdobení dortu, ulož krém aspoň na hodinu do lednice.
