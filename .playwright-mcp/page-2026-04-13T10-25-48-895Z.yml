  - generic [ref=e18]:
    - generic [ref=e20]:
      - heading "Recept na zdravý dort k prvním narozeninám, který budeš péct znovu a znovu!" [level=1] [ref=e21]
      - list [ref=e23]:
        - listitem [ref=e24]:
          - generic [ref=e25]: Sladké
        - listitem [ref=e26]:
          - generic [ref=e27]: Pečení
        - listitem [ref=e28]:
          - generic [ref=e29]: Rady a tipy
      - generic [ref=e30]: 11/2025
    - generic [ref=e31]:
      - paragraph [ref=e32]:
        - text: Upéct
        - strong [ref=e33]: dort k prvním narozeninám
        - text: "je krásný, ale náročný úkol. Na začátku stojí jedno velké rozhodnutí: Zkusit zdravý recept, nebo se radši držet klasiky?"
      - paragraph [ref=e34]:
        - text: Než se ponoříme do dortové tematiky, tohle by tě mohlo zajímat ... Rok s miminkem utekl jako voda a tebe se po těhotenství stále drží pár kilo navíc? Přihlas se na workshop pro mámy
        - link "JAK NASTARTOVAT HUBNUTÍ PO PORODU" [ref=e35] [cursor=pointer]:
          - /url: https://webinar.zdravimebavi.cz
        - text: . Ukážu ti tam jednoduchou cestu k vysněné postavě. Zvládneš to, i když máš jen minimum času, nechceš držet diety, počítat kalorie a trávit hodiny cvičením.
        - link "Tady je odkaz." [ref=e36] [cursor=pointer]:
          - /url: https://webinar.zdravimebavi.cz
      - paragraph [ref=e37]: A teď už pojďme na pečení! Nejdřív je potřeba si ujasnit, pro koho dort ve skutečnosti bude. Jestli myslíš, že ho dítě bude opravdu jíst, zdravý recept se dostává do vedení. Často ale dítě dort jen ochutná a nemá o něj zájem. Potom nemá smysl experimentovat a bude lepší upéct dort, který chutná většině hostů.
      - figure "Dort pro dvouleté dítě, které zvládne sníst drobné ovoce." [ref=e38]:
        - img "Zdravý dort s jahodami" [ref=e40]
        - generic [ref=e41]: Dort pro dvouleté dítě, které zvládne sníst drobné ovoce.
      - paragraph [ref=e42]: A pak je tu situace, kdy víš, že dítě jíst dort bude, ale tobě se do alternativních receptů nechce. Když dítě čas od času sní něco mimo výživová doporučení, vůbec nic se nestane. Určitě bych ale hlídala množství, aby oslavenci nebylo špatně, neexperimentovala s novými alergeny a vynechala suroviny, u kterých hrozí vdechnutí (kusy ořechů, drobné ovoce, ...).
      - paragraph [ref=e43]:
        - text: Jestli ses rozhodla pustit do pečení zdravého dortu, moc ti fandím! Já jsem do toho šla taky. Při vymýšlení receptu bylo potřeba postavit se
        - strong [ref=e44]: třem výzvám
        - text: ":"
      - paragraph [ref=e45]:
        - strong [ref=e46]: "1."
        - text: Dort musí
        - strong [ref=e47]: chutnat
        - text: nejen malému
        - strong [ref=e48]: oslavenci
        - text: ", ale"
        - strong [ref=e49]: i dospělým
        - text: hostům.
      - paragraph [ref=e50]:
        - strong [ref=e51]: "2."
        - strong [ref=e52]: Výběr ingrediencí
        - text: ", které může jíst malé dítě, je"
        - strong [ref=e53]: omezený
        - text: .
      - paragraph [ref=e54]:
        - strong [ref=e55]: "3."
        - text: Dort musí být natolik
        - strong [ref=e56]: pružný a pevný
        - text: ", aby se dal poskládat do pater a nazdobit."
      - paragraph [ref=e57]:
        - text: Proto pro tebe mám
        - strong [ref=e58]: recept na zdravý, chutný a krásný dort,
        - text: který je
        - strong [ref=e59]: jednoduchý na přípravu
        - text: a můžeš ho nachystat den předem. Co víc si rodič malého dítěte může přát, že?
      - paragraph [ref=e60]:
        - text: Aby se dort povedl a stala se z něj jasná volba i na
        - strong [ref=e61]: druhé a každé další narozeniny
        - text: ", je potřeba znát"
        - strong [ref=e62]: pár pravidel
        - text: a vědět, proč je potřeba je dodržet. Pojďme se na ně postupně podívat.
      - figure "Dort k prvním narozeninám" [ref=e63]:
        - img "Lehký dort bez cukru" [ref=e65]
        - generic [ref=e66]: Dort k prvním narozeninám
      - heading "Čím dort osladit?" [level=5] [ref=e67]
      - paragraph [ref=e68]:
        - strong [ref=e69]: Banány
        - text: jsou tady jasná volba. Díky nim bude dort příjemně sladký a vláčný. Použij hodně
        - strong [ref=e70]: zralé
        - text: banány, na chuti to je opravdu znát. V receptu je uvedeno 200 g, to jsou dva střední kusy. Snaž se množství přibližně dodržet, protože málo banánů znamená suché těsto bez chuti. A naopak moc banánů způsobí, že těsto ztěžkne a zůstane mazlavé.
      - paragraph [ref=e71]: ‍
      - heading "Jak na nadýchaný a pružný korpus?" [level=5] [ref=e72]
      - paragraph [ref=e73]: Dortový korpus se tradičně peče z piškotového nebo třeného těsta. Jemnost těchto druhů těst stojí na cukru, který je utřený s tukem a vejci. V těstě díky tomu nejsou různě velké bublinky, korpus se nedrobí a nemá typickou pachuť prášku do pečiva. Pro pružnost se přidává trochu škrobu. Na stavění patrových dortů, které musí vydržet váhu krému a dekorací, je to prostě nejlepší volba.
      - paragraph [ref=e74]:
        - strong [ref=e75]: Bez cukru
        - text: "úplně stejné struktury nedocílíš, můžeš ji ale docela věrně napodobit. Heslo zní: dobře vyšlehaný"
        - strong [ref=e76]: sníh z bílků
        - text: ", pojistka v podobě menšího množství prášku do pečiva a citronová šťáva, která zakryje jeho chuť."
      - paragraph [ref=e77]:
        - text: I když ses rozhodla pro zdravou variantu dortu, použij
        - strong [ref=e78]: bílou hladkou nebo polohrubou mouku
        - text: . Celozrnná varianta se pro malé dítě nehodí a ani struktura těsta by s ní nebyla ideální. Recept počítá s přidáním trochy bramborového škrobu, který těstu dodá tu správnou dortovou konzistenci. Nevynechávej ho obzvlášť, jestli plánuješ skládat dort do více pater. Při prokrajování korpusu a vrstvení pater dortu si ušetříš čas i nervy, protože všechno bude držet, kde má.
      - paragraph [ref=e79]: ‍
      - heading "Z čeho připravit lehký krém, který neteče?" [level=5] [ref=e80]
      - paragraph [ref=e81]: Jen co si oddychneš, protože se ti povedl korpus, je čas myselt na krém. V dětské verzi bude lepší vyhnout se máslovým, smetanovým a mascarpone krémům, které jsou příliš tučné. Ani tvaroh není nejlepší volba, obsahuje totiž pro dítě až moc bílkovin.
      - paragraph [ref=e82]:
        - text: Na přípravu lehkého a dostatečně hustého dortového krému se hodí
        - strong [ref=e83]: řecký jogurt s obsahem tuku 5 %
        - text: . A teď přichází na řadu další trik, díky kterému bude krém sladký, barevný a ještě o trochu pevnější. Do řeckého jogurtu stačí přimíchat rozdrcené
        - strong [ref=e84]: lyofilizované (mrazem sušené) ovoce
        - text: . Pro získání odstínů růžové použij maliny nebo jahody, fialovou barvu krému propůjčí borůvky a ostružiny. Světle žlutá barva vznikne přidáním lyofilozovaných banánů nebo ananasu. Nejradši používám
        - link "tohle lyofilizované ovoce z e-shopu Ochutnej ořech" [ref=e85] [cursor=pointer]:
          - /url: https://www.ochutnejorech.cz/kategorie/lyofilizovane-ovoce/?a_box=qzuy9j66
        - text: . Poměr ceny a kvality je za mě bezkonkurenční.
      - paragraph [ref=e86]:
        - text: Hladký a rovnoměrně barevný krém vznikne, když lyofilizované ovoce
        - strong [ref=e87]: rozmixuješ
        - text: ve stolním mixéru
        - strong [ref=e88]: na prach
        - text: . Přidej k němu malé množství jogurtu, rovnoměrně rozmíchej a až potom obarvi celý krém. Vyhneš se tak zběsilému rozmíchávání hrudek v celém krému. Jogurt ale do stolního mixéru nepřidávej, mixováním by se stal příliš tekutým.
      - paragraph [ref=e89]: ‍
      - heading "Čím ozdobit dort pro roční dítě?" [level=5] [ref=e90]
      - paragraph [ref=e91]:
        - text: Lehký dort s ovocným krémem si přímo říká o jednoduché
        - strong [ref=e92]: zdobení z ovoce
        - text: . Pro malé děti je to stejně nejlepší volba, protože marcipánové, čokoládové a další dortové ozdoby jsou příliš sladké a často uměle obarvené. Pozor na kusy ořechů a drobné ovoce v celku, které by dítě mohlo vdechnout. Například borůvky, kterými je ozdobený dort na fotce, bude lepší na oslavu prvních narozenin nakrájet na poloviny nebo čtvrtiny. Doporučení, v jaké podobě bezpečně nabízet různé potraviny malým dětem, najdeš například na webu
        - link "Solid Starts" [ref=e93] [cursor=pointer]:
          - /url: https://solidstarts.com/
        - text: .
      - figure "Dort k druhým narozeninám" [ref=e94]:
        - generic:
          - img "Dort k druhým narozeninám"
        - generic [ref=e95]: Dort k druhým narozeninám
      - heading "Bonusové tipy, díky kterým budeš dort péct nejen na první narozeniny" [level=4] [ref=e96]
      - paragraph [ref=e97]: "Jsem si jistá, že si tenhle recept na zdravý dort zamiluješ stejně jako moje rodina a budeš se k němu vracet. Já jsem ho opakovala na dcery svátek, v upravené dospělácké verzi ho dostal manžel a peču ho i jako letní koláč s ovocem. Velká výhoda receptu je totiž v jeho nekonečné variabilitě. Vyzkoušej tyhle obměny:"
      - list [ref=e98]:
        - listitem [ref=e99]:
          - text: Aby dort získal zajímavou chuťovou linku, přidej do těsta
          - strong [ref=e100]: lžíci kokosu, mletých ořechů nebo kakaa
          - text: . Pro nákup kvalitních ořechů za fajn ceny
          - link "omrkni e-shop Ochutnej ořech" [ref=e101] [cursor=pointer]:
            - /url: https://www.ochutnejorech.cz/kategorie/orechy/?a_box=qzuy9j66
          - text: .
        - listitem [ref=e102]:
          - text: Ovocný krém vyměň za
          - strong [ref=e103]: čokoládový
          - text: . Do řeckého jogurtu po částech vmíchej rozpuštěnou čokoládu (200 g čokolády na 500 g jogurtu).
        - listitem [ref=e104]: Jestli chceš korpus prokrajovat, použij formu o průměru 21 cm. Pokud chceš jednopatrový dort, zvol průměr formy okolo 24 cm.
      - figure "Dort v letní verzi jako koláč s ovocem" [ref=e105]:
        - generic:
          - img "Dort bez cukru čokoládovým krémem"
        - generic [ref=e106]: Dort v letní verzi jako koláč s ovocem
      - paragraph [ref=e107]:
        - text: Než se pustíš do pečení, mám pro tebe poslední tip, díky kterému poskládáš patra dortu na sebe tak, aby se nesesouvala a vrstva krému zůstala na svém místě. Použij
        - strong [ref=e108]: větší kusy ovoce
        - text: ", které zatlačíš do krému jako"
        - strong [ref=e109]: vzpěrné sloupy
        - text: ", o které se bude opírat horní plát korpusu."
      - figure "Vrstva krému s ovocem před přiklopením dalším plátem korpusu" [ref=e110]:
        - generic:
          - img "Dort s ovocem"
        - generic [ref=e111]: Vrstva krému s ovocem před přiklopením dalším plátem korpusu
      - paragraph [ref=e112]: A teď už pojďme na recept!
